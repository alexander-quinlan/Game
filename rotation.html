<html>

<head></head>

<body>
    <div>
        <canvas id="game" width="500" height="500"></canvas>

    </div>
    <script>
        // Alex, just pretend this is magic ;-)
        function getXYRatio(angle) {
            return [
                Math.cos(angle),
                Math.sin(angle)
            ];
        }

        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        var angle = 0;
        function draw() {
            ctx.clearRect(0, 0, 500, 500);
            ctx.beginPath();
            ctx.arc(250, 250, 50, 0, 2 * Math.PI);
            ctx.fillStyle = 'blue';
            ctx.fill();

            ctx.beginPath();
            const [x,y] = getXYRatio(angle);
            ctx.arc(250 + 150 * x, 250 + 150 * y, 25, 0, 2 * Math.PI);
            ctx.fillStyle = 'red';
            ctx.fill();
            angle += 0.05;
        }
        setInterval(draw, 10);
    </script>


</body>

</html>
